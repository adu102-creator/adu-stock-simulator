<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Register as a participant in the Stock Market Simulator">
  <title>STOCKSIM // REGISTER</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">
</head>
<body>
  <div class="app-container auth-page">
    <div class="auth-container">
      <div class="auth-header">
        <div class="auth-logo">[STOCKSIM::REGISTER]</div>
        <h1>JOIN THE SIMULATION</h1>
        <p>// register to participate in stock market exercises</p>
      </div>

      <div class="auth-card">
        <div id="auth-message" class="auth-message"></div>

        <form id="register-form">
          <div class="form-group">
            <label for="name">FULL NAME</label>
            <input type="text" id="name" class="form-input" placeholder="> your_full_name" required>
          </div>

          <div class="form-group">
            <label for="email">EMAIL</label>
            <input type="email" id="email" class="form-input" placeholder="> user@domain.com" required>
          </div>

          <div class="form-group">
            <label for="username">PARTICIPANT ID</label>
            <input type="text" id="username" class="form-input" placeholder="> choose_username" required>
          </div>

          <div class="form-group">
            <label for="password">PASSWORD</label>
            <input type="password" id="password" class="form-input" placeholder="> ********" required minlength="4">
          </div>

          <button type="submit" class="btn btn-primary btn-lg" id="register-btn">
            [ SUBMIT REGISTRATION ]
          </button>
        </form>
      </div>

      <div class="auth-footer">
        // already registered? <a href="/">[ SIGN IN ]</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('register-form');
    const messageEl = document.getElementById('auth-message');
    const registerBtn = document.getElementById('register-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      registerBtn.disabled = true;
      registerBtn.innerHTML = '<span class="spinner"></span> PROCESSING...';
      messageEl.className = 'auth-message';
      messageEl.style.display = 'none';

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, username, password })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          messageEl.className = 'auth-message success';
          messageEl.textContent = '[ REGISTERED ] // ' + (data.message || 'Awaiting admin approval');
          messageEl.style.display = 'block';
          form.reset();
        } else {
          messageEl.className = 'auth-message error';
          messageEl.textContent = '[ ERROR ] ' + (data.error || 'Registration failed');
          messageEl.style.display = 'block';
        }
      } catch (err) {
        messageEl.className = 'auth-message error';
        messageEl.textContent = '[ CONNECTION ERROR ] // network unreachable';
        messageEl.style.display = 'block';
      }

      registerBtn.disabled = false;
      registerBtn.innerHTML = '[ SUBMIT REGISTRATION ]';
    });
  </script>
  <script src="/js/matrix-rain.js?v=5.0"></script>
</body>
</html>
